  nodeMap = {};
  nodes.forEach((n, i) => nodeMap[n.nr] = i);
  beams = elemData.beams;
  quads = elemData.quads;
  springs = elemData.springs || [];
  constraints = elemData.constraints || [];
  loadcases = lcData;
  sections = {};
  for (const s of secData) sections[s.nr] = s;
  tendons = tndData;

  // Build group map with colors
  groups = {};
  let gIdx = 0;
  for (const g of grpData) {
    groups[g.nr] = { name: g.name, color: GROUP_COLORS[gIdx % GROUP_COLORS.length], visible: true };
    gIdx++;
  }

  // Construction stages from CSM
  CONSTRUCTION_PHASES = csmData || [];
  if (CONSTRUCTION_PHASES.length > 0) {
    // Filter out stages that don't add new groups (prestress-only stages)
    // to keep animation concise — but keep them accessible via slider
    const phaseSlider = document.getElementById('phase-slider');
    phaseSlider.min = -1;
    phaseSlider.max = CONSTRUCTION_PHASES.length - 1;
    phaseSlider.value = -1;
    document.getElementById('phase-label').textContent =
      `Alle Phasen (${CONSTRUCTION_PHASES.length} Bauphasen)`;
  }

  // Info panel
  document.getElementById('project-name').textContent =
    infoData.system.name || 'infraFEM Viewer';
  document.getElementById('v-nodes').textContent = nodes.length;
  document.getElementById('v-beams').textContent = beams.length;
  document.getElementById('v-quads').textContent = quads.length;

  // Loadcase selector
  const sel = document.getElementById('sel-lc');
  sel.innerHTML = '';
  for (const lc of loadcases) {
    const opt = document.createElement('option');
    opt.value = lc.nr;
    opt.textContent = `LF ${lc.nr}: ${lc.name}`;
    sel.appendChild(opt);
  }
  if (loadcases.length > 0) currentLC = loadcases[0].nr;
  document.getElementById('v-lc').textContent = currentLC || '-';

  // Build 3D objects
  buildQuadMesh();
  buildNodeMeshes();
  buildBeamMeshes();
  buildBeamSectionMeshes();
  fitCamera();            // sets modelExtent
  buildSupportSymbols();  // needs modelExtent for sizing
  buildCouplingSymbols(); // needs modelExtent for sizing
  buildTendonPaths();

  // Event handlers
  sel.addEventListener('change', loadResult);
  document.getElementById('sel-result').addEventListener('change', loadResult);

  const slider = document.getElementById('scale-slider');
  slider.addEventListener('input', () => {
    deformScale = parseFloat(slider.value);
    document.getElementById('scale-val').textContent = deformScale + 'x';
    if (!animating) applyDeformation(deformScale);
  });

  document.getElementById('anim-toggle').addEventListener('change', (e) => {
    animating = e.target.checked;
    if (!animating) applyDeformation(deformScale);
  });

  document.getElementById('diagram-slider').addEventListener('input', (e) => {
    diagramScale = parseFloat(e.target.value);
    document.getElementById('diagram-scale-val').textContent = diagramScale;
    if (lastBeamComp && lastBeamData) buildBeamDiagrams(lastBeamComp, lastBeamData);
  });

  document.getElementById('support-slider').addEventListener('input', (e) => {
    document.getElementById('support-scale-val').textContent = e.target.value;
    buildSupportSymbols();
  });

  document.getElementById('toggle-beam-section').addEventListener('change', (e) => {
    if (beamSectionGroup) beamSectionGroup.visible = e.target.checked;
    if (beamMeshes) beamMeshes.visible = !e.target.checked;
    // Rebuild tendons as tubes or lines
    buildTendonPaths();
  });

  document.getElementById('toggle-quad-thickness').addEventListener('change', (e) => {
    if (thicknessMesh) thicknessMesh.visible = e.target.checked;
  });

  document.getElementById('toggle-tendons').addEventListener('change', (e) => {
    if (tendonGroup) tendonGroup.visible = e.target.checked;
  });

  document.getElementById('btn-export-glb').addEventListener('click', exportGLB);

  // Construction phase controls
  document.getElementById('btn-phase-play').addEventListener('click', playConstruction);
  document.getElementById('btn-phase-next').addEventListener('click', () => {
    if (constructionPlaying) { playConstruction(); } // stop
    const next = Math.min(constructionPhase + 1, CONSTRUCTION_PHASES.length - 1);
    applyConstructionPhase(next);
  });
  document.getElementById('btn-phase-prev').addEventListener('click', () => {
    if (constructionPlaying) { playConstruction(); } // stop
    const prev = Math.max(constructionPhase - 1, -1);
    applyConstructionPhase(prev);
  });
  document.getElementById('btn-phase-reset').addEventListener('click', () => {
    if (constructionPlaying) { playConstruction(); } // stop
    applyConstructionPhase(-1);
  });
  document.getElementById('phase-slider').addEventListener('input', (e) => {
    if (constructionPlaying) { playConstruction(); } // stop
    applyConstructionPhase(parseInt(e.target.value));
  });
  document.getElementById('phase-speed').addEventListener('input', (e) => {
    const ms = parseInt(e.target.value);
    document.getElementById('phase-speed-val').textContent = (ms / 1000).toFixed(1) + 's';
    // Restart timer with new speed if playing
    if (constructionPlaying) {
      clearInterval(constructionTimer);
      constructionTimer = setInterval(() => {
        constructionPhase++;
        if (constructionPhase >= CONSTRUCTION_PHASES.length) {
          clearInterval(constructionTimer);
          constructionPlaying = false;
          document.getElementById('btn-phase-play').innerHTML = '&#9654;';
          return;
        }
        applyConstructionPhase(constructionPhase);
      }, ms);
    }
  });

  // Build group toggle checkboxes
  const grpPanel = document.getElementById('group-panel');
  const grpContainer = document.getElementById('group-toggles');
  const grpNrs = Object.keys(groups).map(Number).sort((a, b) => a - b);
  if (grpNrs.length > 0) {
    grpPanel.style.display = 'block';
    for (const gnr of grpNrs) {
      const g = groups[gnr];
      const colorHex = '#' + g.color.toString(16).padStart(6, '0');
      const label = document.createElement('label');
      label.style.cssText = 'cursor:pointer;display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;margin:3px 0;font-size:11px';
      label.innerHTML =
        `<input type="checkbox" checked data-group="${gnr}" style="width:auto;accent-color:${colorHex}">` +
        `<span style="width:10px;height:10px;border-radius:2px;background:${colorHex};flex-shrink:0"></span>` +
        `<span style="color:#bcd">${gnr}: ${g.name || 'Gruppe ' + gnr}</span>`;
      label.querySelector('input').addEventListener('change', (e) => {
        groups[gnr].visible = e.target.checked;
        applyGroupVisibility();
      });
      grpContainer.appendChild(label);
    }
  }

  // Click on quad to show stress panel
  const clickRay = new THREE.Raycaster();
  const clickMouse = new THREE.Vector2();
  let clickTimer = null;
  renderer.domElement.addEventListener('click', (e) => {
    // Delay to distinguish from dblclick
    if (clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
      if (!document.getElementById('toggle-stress-click').checked) return;
      if (!quadMesh || faceToQuad.length === 0) return;
      clickMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      clickMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      clickRay.setFromCamera(clickMouse, camera);
      const hits = clickRay.intersectObject(quadMesh);
      if (hits.length > 0) {
        const quadNr = faceToQuad[hits[0].faceIndex];
        if (quadNr !== undefined) {
          highlightQuad(quadNr);
          showStressPanel(quadNr);
        }
      }
    }, 250);
  });
  renderer.domElement.addEventListener('dblclick', () => {
    if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
  });

  // Stress component selector
  document.getElementById('stress-comp').addEventListener('change', (e) => {
    if (cachedStress) drawStressDiagram(cachedStress, e.target.value);
  });
  document.getElementById('stress-close').addEventListener('click', () => {
    document.getElementById('stress-panel').style.display = 'none';
    clearHighlight();
  });

  // Drag stress panel by its header
  {
    const panel = document.getElementById('stress-panel');
    const header = panel.querySelector('h3');
    let dragging = false, dx = 0, dy = 0;
    header.addEventListener('mousedown', (e) => {
      dragging = true;
      dx = e.clientX - panel.offsetLeft;
      dy = e.clientY - panel.offsetTop;
      header.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      panel.style.left = (e.clientX - dx) + 'px';
      panel.style.top = (e.clientY - dy) + 'px';
      panel.style.right = 'auto';
    });
    window.addEventListener('mouseup', () => {
      dragging = false;
      header.style.cursor = 'grab';
    });
  }

  document.getElementById('status').textContent =
    `infraFEM v0.1 | ${nodes.length} Knoten | ${quads.length} QUAD | ${beams.length} Balken`;

  // Render loop
  function animate(time) {
    requestAnimationFrame(animate);
    if (animating && deformScale > 0 && dispCache[currentLC]) {
      const t = Math.sin(time * 0.003); // ~2s period
      applyDeformation(deformScale * t);
    }
    controls.update();
    renderer.render(scene, camera);
  }
  animate(0);
}

init().catch(e => {
  console.error(e);
  document.getElementById('status').textContent = 'Fehler: ' + e.message;
});
</script>
</body>
</html>
