<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>infraFEM Editor</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    color: #c8d0e0;
    background: #1a1a2e;
}

/* ─── Layout ───────────────────────────────────────────── */
#app {
    display: grid;
    grid-template-columns: 48px 1fr 260px;
    grid-template-rows: 1fr 28px;
    height: 100vh;
}
#toolbar {
    grid-row: 1;
    grid-column: 1;
    background: rgba(10, 10, 30, 0.92);
    border-right: 1px solid #334;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 2px;
    z-index: 10;
    overflow-y: auto;
}
#canvas-container {
    grid-row: 1;
    grid-column: 2;
    position: relative;
    overflow: hidden;
}
#properties {
    grid-row: 1;
    grid-column: 3;
    background: rgba(10, 10, 30, 0.92);
    border-left: 1px solid #334;
    overflow-y: auto;
    padding: 12px;
    z-index: 10;
}
#statusbar {
    grid-row: 2;
    grid-column: 1 / -1;
    background: rgba(10, 10, 30, 0.95);
    border-top: 1px solid #334;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 12px;
    color: #8899aa;
    z-index: 10;
}

/* ─── Toolbar Buttons ──────────────────────────────────── */
.tool-btn {
    width: 40px;
    height: 40px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    color: #8899bb;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
}
.tool-btn:hover {
    background: rgba(126, 184, 255, 0.1);
    border-color: #445;
    color: #aabbdd;
}
.tool-btn.active {
    background: rgba(126, 184, 255, 0.2);
    border-color: #7eb8ff;
    color: #7eb8ff;
}
.tool-icon { font-size: 18px; line-height: 1; }
.tool-label { font-size: 9px; opacity: 0.6; margin-top: 1px; }
.action-btn .tool-icon { font-size: 16px; }
.tool-sep {
    width: 30px;
    height: 1px;
    background: #334;
    margin: 6px 0;
}

/* ─── Properties Panel ─────────────────────────────────── */
#properties h3 {
    font-size: 12px;
    font-weight: 600;
    color: #7eb8ff;
    margin: 12px 0 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
#properties h3:first-child { margin-top: 0; }
.prop-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
}
.prop-group label {
    min-width: 80px;
    font-size: 11px;
    color: #8899aa;
}
.prop-group input, .prop-group select {
    flex: 1;
    background: #16162b;
    border: 1px solid #334;
    border-radius: 4px;
    color: #c8d0e0;
    padding: 4px 6px;
    font-size: 12px;
}
.prop-group input:focus, .prop-group select:focus {
    outline: none;
    border-color: #7eb8ff;
}
.prop-val {
    color: #aab;
    font-family: monospace;
    font-size: 12px;
}

/* ─── List Items ───────────────────────────────────────── */
.list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    font-size: 11px;
    cursor: default;
}
.list-item:hover { background: rgba(126, 184, 255, 0.08); }
.list-item.active { background: rgba(126, 184, 255, 0.15); border-left: 2px solid #7eb8ff; }
.lc-select { cursor: pointer; flex: 1; }

/* ─── Buttons ──────────────────────────────────────────── */
.btn-sm {
    background: rgba(126, 184, 255, 0.15);
    border: 1px solid #445;
    border-radius: 4px;
    color: #7eb8ff;
    padding: 1px 6px;
    font-size: 12px;
    cursor: pointer;
}
.btn-sm:hover { background: rgba(126, 184, 255, 0.3); }
.btn-del { color: #ff6666; background: transparent; border: none; font-size: 14px; }
.btn-del:hover { color: #ff4444; }
.btn-full {
    width: 100%;
    padding: 6px 12px;
    background: rgba(126, 184, 255, 0.15);
    border: 1px solid #445;
    border-radius: 4px;
    color: #7eb8ff;
    cursor: pointer;
    font-size: 12px;
    margin-top: 6px;
}
.btn-full:hover { background: rgba(126, 184, 255, 0.25); }
.btn-danger {
    color: #ff6666;
    border-color: #633;
    background: rgba(255, 80, 80, 0.1);
}
.btn-danger:hover { background: rgba(255, 80, 80, 0.2); }

/* ─── Status Bar ───────────────────────────────────────── */
.status-mode {
    color: #7eb8ff;
    font-weight: 600;
}
.status-sep { color: #334; }
.status-right { margin-left: auto; color: #7eb8ff; }

/* ─── DAT Preview Overlay ──────────────────────────────── */
.dat-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.dat-dialog {
    background: #1a1a2e;
    border: 1px solid #445;
    border-radius: 8px;
    width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
}
.dat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #334;
}
.dat-header h3 { margin: 0; color: #7eb8ff; }
.dat-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: #c8d0e0;
    white-space: pre;
    tab-size: 4;
}
.dat-footer {
    padding: 8px 16px;
    border-top: 1px solid #334;
}

/* ─── Result Floating Widget ──────────────────────────── */
#result-widget {
    position: fixed;
    top: 12px;
    right: 272px;
    background: rgba(10, 10, 30, 0.92);
    border: 1px solid #445;
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 20;
    min-width: 180px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    display: none;
    cursor: default;
}
#result-widget.visible { display: block; }
.result-widget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: move;
    margin-bottom: 8px;
    user-select: none;
}
.result-widget-title {
    font-size: 11px;
    color: #7eb8ff;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.result-widget-close {
    background: none;
    border: none;
    color: #667;
    font-size: 14px;
    cursor: pointer;
    padding: 0 2px;
}
.result-widget-close:hover { color: #aab; }
.result-toggles {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 8px;
}
.result-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8899bb;
    cursor: pointer;
    padding: 3px 4px;
    border-radius: 3px;
}
.result-toggle:hover {
    background: rgba(126, 184, 255, 0.1);
    color: #aabbdd;
}
.result-toggle input[type="checkbox"] {
    accent-color: #7eb8ff;
    width: 14px;
    height: 14px;
}
.result-toggle .color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
}
.result-sliders {
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px solid #334;
    padding-top: 8px;
}
.result-slider-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #667;
}
.result-slider-row input[type="range"] {
    flex: 1;
    height: 4px;
    accent-color: #7eb8ff;
    cursor: pointer;
}
.result-slider-row .slider-val {
    font-family: monospace;
    font-size: 10px;
    color: #8899bb;
    min-width: 28px;
    text-align: right;
}

/* ─── Result Summary (Properties) ─────────────────────── */
.result-summary {
    font-size: 11px;
    margin-top: 4px;
}
.result-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid rgba(51, 68, 85, 0.3);
}
.result-label {
    color: #8899aa;
    font-weight: 500;
    min-width: 65px;
}
.result-val {
    color: #c8d0e0;
    font-family: monospace;
    font-size: 11px;
    text-align: right;
}

/* ─── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #556; }

/* ─── Quad Color Legend ───────────────────────────────── */
#quad-color-legend {
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    user-select: none;
}

/* ─── System Start Dialog ────────────────────────────── */
#start-dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}
#start-dialog {
    background: #1a1a2e;
    border: 1px solid #445;
    border-radius: 12px;
    padding: 24px 32px;
    min-width: 520px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#start-dialog h2 {
    color: #7eb8ff;
    font-size: 16px;
    margin: 0 0 16px;
    font-weight: 600;
}
#start-dialog h3 {
    color: #8899aa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
}
.system-types {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}
.system-type-btn {
    background: rgba(126, 184, 255, 0.05);
    border: 2px solid #334;
    border-radius: 8px;
    padding: 12px 8px;
    color: #8899bb;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
}
.system-type-btn:hover {
    background: rgba(126, 184, 255, 0.1);
    border-color: #556;
    color: #aabbdd;
}
.system-type-btn.selected {
    background: rgba(126, 184, 255, 0.15);
    border-color: #7eb8ff;
    color: #7eb8ff;
}
.system-type-btn .st-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 6px;
}
.system-type-btn .st-label {
    font-size: 12px;
    font-weight: 500;
}
.system-type-btn .st-desc {
    font-size: 9px;
    color: #667;
    margin-top: 2px;
}
#start-dialog .start-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}
#start-dialog .start-row label {
    min-width: 80px;
    font-size: 12px;
    color: #8899aa;
}
#start-dialog .start-row input,
#start-dialog .start-row select {
    flex: 1;
    background: #16162b;
    border: 1px solid #334;
    border-radius: 4px;
    color: #c8d0e0;
    padding: 5px 8px;
    font-size: 12px;
}
#start-dialog .start-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
}
#start-dialog .start-actions button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #445;
    cursor: pointer;
    font-size: 13px;
}
#start-dialog .btn-start {
    background: rgba(126, 184, 255, 0.2);
    color: #7eb8ff;
    font-weight: 600;
}
#start-dialog .btn-start:hover { background: rgba(126, 184, 255, 0.35); }
#start-dialog .btn-cancel {
    background: transparent;
    color: #8899aa;
}
#start-dialog .btn-cancel:hover { background: rgba(255,255,255,0.05); }
</style>
</head>
<body>
<div id="app">
    <div id="toolbar"></div>
    <div id="canvas-container"></div>
    <div id="properties"></div>
    <div id="statusbar"></div>
</div>
<div id="result-widget"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>
<script type="module">
import { EditorModel } from './editor-core.js';
import { EditorCanvas } from './editor-canvas.js';
import { Toolbar, PropertiesPanel, StatusBar, ResultWidget } from './editor-ui.js';
import { EditorAPI } from './editor-api.js';

// ─── System Type Definitions ──────────────────────────────
const SYSTEM_TYPES = {
    'RAHM':  { label: '2D Rahmen',  icon: '┃━┃', desc: 'Stäbe in XZ-Ebene',       plane: 'XZ', elements: 'beams' },
    'PLATTE':{ label: '2D Platte',  icon: '▦',   desc: 'Flächen in XY, Last in Z', plane: 'XY', elements: 'areas' },
    'SCHEIBE':{ label: '2D Scheibe', icon: '▥',   desc: 'Flächen in XY, Last in XY', plane: 'XY', elements: 'areas' },
    'ROST':  { label: '2D Rost',    icon: '╬',   desc: 'Stäbe in XY-Ebene',        plane: 'XY', elements: 'beams' },
    '3D':    { label: '3D',         icon: '⬟',   desc: 'Stäbe + Flächen im Raum',  plane: 'XYZ', elements: 'both' },
};

// ─── Start Dialog ─────────────────────────────────────────
function showStartDialog() {
    return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.id = 'start-dialog-overlay';
        overlay.innerHTML = `
        <div id="start-dialog">
            <h2>Neues Projekt</h2>
            <div class="start-row">
                <label>Name</label>
                <input type="text" id="sd-name" value="Neues Modell">
            </div>
            <h3>Systemtyp</h3>
            <div class="system-types">
                ${Object.entries(SYSTEM_TYPES).map(([key, st]) => `
                    <div class="system-type-btn ${key === 'PLATTE' ? 'selected' : ''}" data-type="${key}">
                        <span class="st-icon">${st.icon}</span>
                        <span class="st-label">${st.label}</span>
                        <span class="st-desc">${st.desc}</span>
                    </div>
                `).join('')}
            </div>
            <h3>Norm</h3>
            <div class="start-row">
                <label>Norm</label>
                <select id="sd-norm">
                    <option value="EN199X-200X" selected>EN 1992/1993/1994 (Eurocode)</option>
                    <option value="DIN">DIN</option>
                </select>
            </div>
            <div class="start-actions">
                <button class="btn-cancel" id="sd-cancel">Abbrechen</button>
                <button class="btn-start" id="sd-ok">Erstellen</button>
            </div>
        </div>`;
        document.body.appendChild(overlay);

        let selectedType = 'PLATTE';

        // System type selection
        for (const btn of overlay.querySelectorAll('.system-type-btn')) {
            btn.onclick = () => {
                overlay.querySelectorAll('.system-type-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedType = btn.dataset.type;
            };
        }

        overlay.querySelector('#sd-ok').onclick = () => {
            const name = overlay.querySelector('#sd-name').value || 'Neues Modell';
            overlay.remove();
            resolve({ name, systemType: selectedType });
        };
        overlay.querySelector('#sd-cancel').onclick = () => {
            overlay.remove();
            resolve(null); // cancelled — use defaults
        };

        // Focus name input
        setTimeout(() => overlay.querySelector('#sd-name').focus(), 100);
    });
}

// ─── Init ─────────────────────────────────────────────────
const model = new EditorModel();
const api = new EditorAPI();

const canvas = new EditorCanvas(
    document.getElementById('canvas-container'),
    model
);

const toolbar = new Toolbar(
    document.getElementById('toolbar'),
    model,
    api,
    canvas
);

const props = new PropertiesPanel(
    document.getElementById('properties'),
    model
);

const status = new StatusBar(
    document.getElementById('statusbar'),
    model
);

const resultWidget = new ResultWidget(model, canvas);

// ─── Show start dialog on load ───────────────────────────
(async () => {
    const result = await showStartDialog();
    if (result) {
        model.data.meta.name = result.name;
        model.data.meta.systemType = result.systemType;
        // Configure based on system type
        const st = SYSTEM_TYPES[result.systemType];
        if (st) {
            // Remove default section for plate-only systems
            if (st.elements === 'areas') {
                model.data.sections = [];
            }
        }
        model.bus.emit('model:changed');
    }
    document.getElementById('status-msg').textContent =
        `${model.data.meta.name} — ${SYSTEM_TYPES[model.data.meta.systemType]?.label || model.data.meta.systemType}`;
})();

// ─── Also show dialog on "Neu" (reset) ──────────────────
const origReset = model.reset.bind(model);
model.reset = async function() {
    origReset();
    const result = await showStartDialog();
    if (result) {
        model.data.meta.name = result.name;
        model.data.meta.systemType = result.systemType;
        const st = SYSTEM_TYPES[result.systemType];
        if (st && st.elements === 'areas') {
            model.data.sections = [];
        }
        model.bus.emit('model:changed');
    }
    document.getElementById('status-msg').textContent =
        `${model.data.meta.name} — ${SYSTEM_TYPES[model.data.meta.systemType]?.label || model.data.meta.systemType}`;
};

// ─── Expose for debugging ─────────────────────────────────
window._editor = { model, canvas, api, resultWidget };
</script>
</body>
</html>
